name: 'AI GitHub Toolkit'
description: 'AI-powered GitHub automation tools (PR review, and more), starting with the PR Reviewer'
author: 'Abubakar'

inputs:
  tool:
    description: 'Which tool to run. Currently supported: review-pr'
    default: 'review-pr'
  api-key:
    description: 'API key for the LLM provider (e.g. a Gemini AI Studio key).'
    required: true
  base-url:
    description: 'OpenAI-compatible base URL. Defaults to Gemini if unset.'
    required: false
  model-id:
    description: 'Model ID to use. Defaults to gemini-3-flash-preview if unset.'
    required: false
  config-path:
    description: 'Path to the review config file in the consumer repo.'
    default: '.github/pr-reviewer.yml'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install ai-github-toolkit
      shell: bash
      run: pip install ai-github-toolkit

    - name: Run tool
      shell: bash
      run: ai-toolkit ${{ inputs.tool }} --config-path "${{ inputs.config-path }}"
      env:
        GITHUB_TOKEN: ${{ github.token }}
        AI_API_KEY: ${{ inputs.api-key }}
        LLM_BASE_URL: ${{ inputs.base-url }}
        MODEL_ID: ${{ inputs.model-id }}

branding:
  icon: 'code'
  color: 'purple'
